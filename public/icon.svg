<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Deep futuristic background gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#0f0c29" />
      <stop offset="100%" stop-color="#020010" />
    </radialGradient>
    
    <!-- Glowing neon educational symbol gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>

    <linearGradient id="accent-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Glowing shadow filters for premium native App Look -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base (App Icon frame) -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Subtle tech background grid pattern -->
  <g opacity="0.15">
    <circle cx="256" cy="256" r="210" fill="none" stroke="#818cf8" stroke-width="2" stroke-dasharray="10 15" />
    <circle cx="256" cy="256" r="160" fill="none" stroke="#818cf8" stroke-width="1" />
    <path d="M 46 256 L 466 256 M 256 46 L 256 466" stroke="#818cf8" stroke-width="1" />
  </g>

  <!-- Outer Protective Halo Shield -->
  <path d="M 256 70 C 340 70 410 110 410 200 C 410 320 256 430 256 430 C 256 430 102 320 102 200 C 102 110 172 70 256 70 Z" 
        fill="none" stroke="url(#accent-grad)" stroke-width="6" opacity="0.4" />

  <!-- Main glowing core geometry - Stylized 'M' blending AI Book and Brain Synapses -->
  <g filter="url(#glow)">
    <!-- Elegant open virtual book pages -->
    <path d="M 256 240 Q 300 200 360 220 L 360 320 Q 300 300 256 340 Q 212 300 152 320 L 152 220 Q 212 200 256 240 Z" 
          fill="url(#primary-grad)" stroke="#ffffff" stroke-width="1.5" opacity="0.9" />

    <!-- AI neural light-beams/node vectors forming 'M' inside the book -->
    <!-- Front M-arch -->
    <path d="M 170 310 L 220 190 L 256 240 L 292 190 L 342 310" 
          fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Glowing futuristic core orb (The Wisdom Core) -->
    <circle cx="256" cy="150" r="28" fill="url(#accent-grad)" filter="url(#glow)" />
    
    <!-- Connection lines to Wisdom Core -->
    <path d="M 220 190 L 256 150 L 292 190" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    
    <!-- Synaptic mini glowing nodes -->
    <circle cx="220" cy="190" r="7" fill="#ffffff" />
    <circle cx="292" cy="190" r="7" fill="#ffffff" />
    <circle cx="256" cy="240" r="7" fill="#ffffff" />
    <circle cx="170" cy="310" r="7" fill="url(#accent-grad)" />
    <circle cx="342" cy="310" r="7" fill="url(#accent-grad)" />
  </g>

  <!-- Sparkles on top corners to align with MRIVAN premium aesthetic -->
  <g fill="#ffffff" opacity="0.9" filter="url(#glow)">
    <!-- Top-Left Sparkle -->
    <path d="M 120 110 L 125 125 L 140 130 L 125 135 L 120 150 L 115 135 L 100 130 L 115 125 Z" />
    <!-- Top-Right Sparkle -->
    <path d="M 390 100 L 393 112 L 405 115 L 393 118 L 390 130 L 387 118 L 375 115 L 387 112 Z" />
  </g>
</svg>
